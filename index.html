<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faz Cuts</title>
  
  <!-- PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Faz Cuts">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  
  <!-- OneSignal SDK -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
  </script>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      text-align: center;
    }
    .container {
      padding: 40px 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      color: #D4AF37;
    }
    .subtitle {
      font-size: 18px;
      color: #999;
      margin-bottom: 40px;
    }
    #notify-btn {
      background: #D4AF37;
      color: #000;
      padding: 16px 32px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      margin: 20px 0;
      cursor: pointer;
      display: none; /* Hidden by default, JS shows it if needed */
    }
    #notify-btn:active {
      transform: scale(0.98);
    }
    .subscribed-msg {
      color: #4CAF50;
      font-size: 14px;
      margin: 20px 0;
      display: none;
    }
    .btn {
      display: block;
      background: #1a1a1a;
      color: #fff;
      text-decoration: none;
      padding: 16px;
      margin: 12px 0;
      border-radius: 8px;
      border: 1px solid #333;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>FAZ CUTS</h1>
    <p class="subtitle">London's Premier Barber</p>
    
    <!-- Notification Button - Shows only if NOT subscribed -->
    <button id="notify-btn">Enable Notifications 🔔</button>
    <div id="subscribed-msg" class="subscribed-msg">✅ Notifications Enabled</div>
    
    <a href="https://booksy.com" class="btn">Book Appointment</a>
    <a href="tel:+44XXXXXXXXXX" class="btn">Call Faz</a>
    <a href="https://maps.google.com" class="btn">Get Directions</a>
  </div>

  <script>
    OneSignalDeferred.push(async function(OneSignal) {
      // Initialize OneSignal
      await OneSignal.init({
        appId: "9f4daf55-8ade-4e9f-b64e-876a64ad294f",
        serviceWorkerPath: "/OneSignalSDKWorker.js",
        serviceWorkerParam: { scope: "/" },
        allowLocalhostAsSecureOrigin: true
      });

      const btn = document.getElementById('notify-btn');
      const msg = document.getElementById('subscribed-msg');
      
      // Function to check subscription status and update UI
      async function updateSubscriptionUI() {
        const isSubscribed = await OneSignal.User.PushSubscription.optedIn;
        
        if (isSubscribed) {
          btn.style.display = 'none';
          msg.style.display = 'block';
        } else {
          btn.style.display = 'inline-block';
          msg.style.display = 'none';
        }
      }
      
      // Check on page load
      await updateSubscriptionUI();
      
      // Handle button click
      btn.onclick = async () => {
        await OneSignal.Slidedown.promptPush();
        
        // Wait 2s then recheck subscription status
        setTimeout(async () => {
          await updateSubscriptionUI();
          const isNowSubscribed = await OneSignal.User.PushSubscription.optedIn;
          if (isNowSubscribed) {
            alert('Subscribed! You\'ll get last-minute offers from Faz Cuts 🔔');
          }
        }, 2000);
      };
      
      // Listen for subscription changes
      OneSignal.User.PushSubscription.addEventListener('change', updateSubscriptionUI);
    });
  </script>
</body>
</html>
