<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAZ CUTS | London's Premier Barber</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FazCuts">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>window.OneSignalDeferred = window.OneSignalDeferred || [];</script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #D4AF37;
            --bg: #000000;
            --text: #FFFFFF;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Inter',sans-serif;}
        body,html{height:100%;background-color:var(--bg);color:var(--text);overflow-x:hidden;overflow-y:auto;}

        /* LOADER */
        #app-loader{position:fixed;inset:0;background:#000;z-index:10000;display:flex;align-items:center;justify-content:center;transition:transform 0.8s cubic-bezier(0.9,0,0.1,1);}
      .loader-content{display:flex;flex-direction:column;align-items:center;text-align:center;line-height:1;}
      .loader-content span{color:#FFFFFF;}
      .layer-1{font-size:7rem;font-weight:900;color:var(--primary);letter-spacing:-5px;animation:slideFromRight 0.8s cubic-bezier(0.16,1,0.3,1) forwards;}
      .layer-2{font-size:2.5rem;font-weight:900;color:#FFF;letter-spacing:-1.5px;margin-top:5px;opacity:0;animation:slideFromLeft 0.8s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;}
      .layer-3{font-size:2.5rem;font-weight:900;color:var(--primary);letter-spacing:-1.5px;opacity:0;animation:slideFromTop 0.8s cubic-bezier(0.16,1,0.3,1) 0.8s forwards;}
        @keyframes slideFromRight{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
        @keyframes slideFromLeft{from{transform:translateX(-100px);opacity:0}to{transform:translateX(0);opacity:1}}
        @keyframes slideFromTop{from{transform:translateY(-50px);opacity:0}to{transform:translateY(0);opacity:1}}

        /* APP SHELL */
        #app-container{min-height:100vh;display:flex;flex-direction:column;opacity:0;transition:opacity 0.5s ease-in;position:relative;}
        header{padding:calc(var(--safe-top) + 30px) 25px 20px;display:flex;justify-content:center;align-items:center;background:transparent;width:100%;position:absolute;top:0;left:0;z-index:800;}
      .header-spacer{height:130px;width:100%;}
      .app-logo{font-size:2.2rem;font-weight:900;letter-spacing:-1.5px;color:var(--primary);}
      .app-logo span{color:#FFFFFF;}
      .content-scroll{flex:1;padding:0 25px 100px;}
      .hero-area{text-align:center;padding:80px 0 50px;}
      .hero-area h1{font-size:3.2rem;font-weight:900;line-height:0.9;letter-spacing:-3px;margin-bottom:20px;color:var(--primary);max-width:800px;margin-left:auto;margin-right:auto;}
      .typewriter-container{font-size:3.2rem;font-weight:900;color:#FFFFFF;line-height:0.9;letter-spacing:-3px;margin-bottom:50px;text-transform:capitalize;min-height:4.2rem;white-space:nowrap;display:inline-block;width:100%;text-align:center;overflow-x:visible;}
        
        /* GDPR CONSENT BANNER */
      .consent-banner {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 18px;
            border-radius: 12px;
            margin: 0 auto 32px;
            max-width: 500px;
            display: none;
            animation: slideDown 0.4s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
      .consent-banner p {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
            color: #ccc;
        }
      .consent-banner a {
            color: var(--primary);
            text-decoration: underline;
        }
      .consent-btn {
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            border: none;
            margin-right: 8px;
        }
      .consent-yes {
            background: var(--primary);
            color: #000;
        }
      .consent-no {
            background: transparent;
            color: #999;
            border: 1px solid #333;
        }
        
        /* SUBSCRIBED BANNER */
      .subscribed-banner {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid #4CAF50;
            color: #4CAF50;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            margin: 0 auto 40px;
            display: none;
            max-width: 500px;
            text-align: center;
        }
        
      .btn {
            display: block;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            padding: 18px;
            margin: 14px auto;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 16px;
            font-weight: 700;
            max-width: 500px;
            transition: all 0.2s;
        }
      .btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        /* DOCK */
      .app-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(20px);
            height: 70px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
            border-top: 1px solid rgba(212,175,55,0.15);
            width: 100%;
        }
      .dock-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
            text-decoration: none;
            gap: 4px;
            cursor: pointer;
            background: none;
            border: none;
            flex: 1;
            padding: 8px 0;
        }
      .dock-btn.active{color:var(--primary);}
      .dock-btn i{font-size:1.4rem;}
      .dock-btn span{font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;}
      .dock-center {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1.6rem;
            margin-top: -32px;
            border: 4px solid #000;
            box-shadow: 0 8px 20px rgba(212,175,55,0.35);
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- LOADER -->
<div id="app-loader"><div class="loader-content"><div class="layer-1">FAZ<span>.</span></div><div class="layer-2">London's Premier</div><div class="layer-3">Barber Shop.</div></div></div>

<!-- MAIN APP -->
<div id="app-container">
    <header id="main-header"><div class="app-logo">FAZ<span>.</span></div></header>
    <div class="header-spacer"></div>
    <main class="content-scroll">
        <div class="hero-area">
            <h1>FAZ CUTS</h1>
            <div class="typewriter-container"><span id="typewriter"></span></div>
            
            <!-- GDPR CONSENT BANNER -->
            <div id="consent-banner" class="consent-banner">
                <p>
                    Get alerts for last-minute slots and exclusive offers. You can unsubscribe anytime.
                    <a href="/privacy.html">Privacy Policy</a>
                </p>
                <button id="consent-yes" class="consent-btn consent-yes">Allow Alerts</button>
                <button id="consent-no" class="consent-btn consent-no">No Thanks</button>
            </div>
            
            <div id="subscribed-banner" class="subscribed-banner">
                ✅ Notifications On — You'll get last-minute slot alerts
            </div>
            
            <a href="https://booksy.com/your-link" class="btn">Book Appointment</a>
            <a href="tel:+447000000000" class="btn">Call Faz</a>
            <a href="https://maps.google.com/?q=Faz+Cuts+London" class="btn">Get Directions</a>
        </div>
    </main>

    <nav class="app-dock">
        <a href="#" class="dock-btn active"><i class="fa-solid fa-house-chimney"></i><span>HOME</span></a>
        <a href="https://booksy.com/your-link" class="dock-btn"><i class="fa-solid fa-calendar"></i><span>BOOK</span></a>
        <a href="tel:+447000000000" class="dock-center"><i class="fa-solid fa-phone"></i></a>
        <a href="https://maps.google.com/?q=Faz+Cuts+London" class="dock-btn"><i class="fa-solid fa-location-dot"></i><span>MAP</span></a>
        <a href="https://instagram.com/fazcuts" class="dock-btn"><i class="fa-brands fa-instagram"></i><span>SOCIAL</span></a>
    </nav>
</div>

<script>
    // TYPEWRITER
    const typewriterWords = ["Fresh Fades", "Sharp Lines", "Clean Cuts", "Beard Trims", "Hot Towels"];
    let typeIdx = 0, typeChar = 0, typeDeleting = false, typeWait = false;
    const typeEl = document.getElementById('typewriter');
    setInterval(() => {
        if (!typeEl || typeWait) return;
        const currentText = typewriterWords[typeIdx];
        if (!typeDeleting) {
            typeEl.textContent = currentText.substring(0, typeChar + 1);
            typeChar++;
            if (typeChar === currentText.length) { typeWait = true; setTimeout(()=>{ typeDeleting=true; typeWait=false; },1800); }
        } else {
            typeEl.textContent = currentText.substring(0, typeChar - 1);
            typeChar--;
            if (typeChar === 0) { typeDeleting=false; typeIdx=(typeIdx+1)%typewriterWords.length; typeWait=true; setTimeout(()=>{ typeWait=false; },300); }
        }
    }, 80);

    // ONESIGNAL + GDPR
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "9f4daf55-8ade-4e9f-b64e-876a64ad294f",
        serviceWorkerPath: "/OneSignalSDKWorker.js",
        serviceWorkerParam: { scope: "/" },
        allowLocalhostAsSecureOrigin: true
      });

      const consentBanner = document.getElementById('consent-banner');
      const subscribedBanner = document.getElementById('subscribed-banner');
      const consentGiven = localStorage.getItem('fazcuts_gdpr_consent');
      
      const isSubscribed = await OneSignal.User.PushSubscription.optedIn;
      
      if (isSubscribed) {
        subscribedBanner.style.display = 'block';
      } else if (!consentGiven) {
        // Show GDPR banner 2 seconds after load
        setTimeout(() => {
          consentBanner.style.display = 'block';
        }, 2000);
      }
      
      // Consent YES: save + trigger iOS prompt
      document.getElementById('consent-yes').onclick = async () => {
        localStorage.setItem('fazcuts_gdpr_consent', 'yes');
        localStorage.setItem('fazcuts_consent_date', new Date().toISOString());
        consentBanner.style.display = 'none';
        await OneSignal.Slidedown.promptPush();
      };
      
      // Consent NO: save + hide
      document.getElementById('consent-no').onclick = () => {
        localStorage.setItem('fazcuts_gdpr_consent', 'no');
        consentBanner.style.display = 'none';
      };
      
      // Listen for subscription changes
      OneSignal.User.PushSubscription.addEventListener('change', async (event) => {
        if (event.current.optedIn) {
          subscribedBanner.style.display = 'block';
        }
      });
    });

    window.addEventListener("load",function(){ 
        setTimeout(()=>{ 
            document.getElementById('app-loader').style.transform='translateY(-100%)'; 
            document.getElementById('app-container').style.opacity='1'; 
        },1800); 
    });
</script>
</body>
</html>
